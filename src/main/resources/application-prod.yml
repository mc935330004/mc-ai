spring:
  datasource:
    # 生产环境 MySQL 主数据源，必须通过环境变量注入
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_DATASOURCE_URL}
    username: ${MYSQL_DATASOURCE_USERNAME}
    password: ${MYSQL_DATASOURCE_PASSWORD}
  ai:
    vectorstore:
      pgvector:
        # 生产环境禁止应用启动时自动初始化 schema，表结构应由运维或迁移脚本管理
        initialize-schema: false
        # 生产环境建议开启 schema 校验，提前发现向量表结构和配置不一致
        schema-validation: ${PGVECTOR_SCHEMA_VALIDATION:true}

app:
  storage:
    ftp:
      # 生产环境 FTP 文件存储配置，全部通过环境变量注入
      host: ${FTP_HOST}
      username: ${FTP_USERNAME}
      password: ${FTP_PASSWORD}
      port: ${FTP_PORT:21}
      # 生产环境必须显式指定知识库文件根目录
      base-dir: ${FTP_BASE_DIR}
      # 文件访问前缀，供下载或外部访问场景使用
      path-url: ${FTP_PATH_URL}
  pgvector:
    datasource:
      # 生产环境 PGVector 独立数据源，保存向量库表和索引
      driver-class-name: org.postgresql.Driver
      url: ${PGVECTOR_DATASOURCE_URL}
      username: ${PGVECTOR_DATASOURCE_USERNAME}
      password: ${PGVECTOR_DATASOURCE_PASSWORD}
