server:
  # 应用启动端口，本地访问地址示例：http://localhost:8089/agent-rag
  port: 8089
  tomcat:
    # 统一请求 URI 编码，避免中文路径或参数乱码
    uri-encoding: UTF-8
  servlet:
    # 应用上下文路径，所有接口都会带此前缀
    context-path: /agent-rag

spring:
  profiles:
    # 默认启用开发环境配置；生产部署时应通过启动参数或环境变量切换为 prod
    active: @spring.profiles.active@
  ai:
    # Spring AI 模型类型声明：对话和向量模型都走 OpenAI 兼容协议
    model:
      chat: openai
      embedding: openai
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    openai:
      chat:
        # DeepSeek 对话模型地址和 API Key；API Key 必须从环境变量读取
#        base-url: https://api.deepseek.com
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
#        api-key: ${DEEPSEEK_API_KEY}
        api-key: ${GLM_API_KEY}
        model: deepseek-v4-flash
#        model: glm-5.2
        temperature: 0.2 # 企业数据回答强调稳定性，降低随机性和无关扩写
        max-tokens: 2048 # 最大生成 tokens 数
        top-p: 0.8 # 适度保留候选词范围
        # 要求 OpenAI 兼容供应商在流式响应结束时返回 Token Usage。
        stream-options:
          include-usage: true
      embedding:
        # 百炼 DashScope Embedding，维度必须与 PGVector 配置保持一致
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${DASHSCOPE_API_KEY}
        model: text-embedding-v4
        dimensions: 1024
    vectorstore:
      # 向量库类型：当前项目使用 PostgreSQL + pgvector
      type: pgvector
      pgvector:
        # 公共默认不自动初始化 schema，避免生产环境误删或误改表结构
        initialize-schema: false
        schema-name: public
        table-name: vector_store
        # 向量维度需要和 embedding 模型输出维度一致
        dimensions: 1024
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        # 禁止启动时删除已有向量表，保护已入库知识库向量数据
        remove-existing-vector-store-table: false
        schema-validation: false
        max-document-batch-size: 10000
  flyway:
    # Flyway 管理 MySQL 业务表结构迁移
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 4
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

document:
  parse:
    # 默认关闭 Docling，避免非开发环境未配置地址时误调用
    docling-enabled: true
    # Docling 文件解析接口路径，环境不同优先只覆盖 url
    path: /api/parse/sync
    # Docling 服务地址，生产环境建议通过 DOCLING_URL 注入
    url: http://localhost:8001
#    url: http://192.168.12.84:8001
    # 连接 Docling 的超时时间，单位毫秒
    connect-timeout-ms: 10000
    # 等待 Docling 解析结果的超时时间，单位毫秒
    read-timeout-ms: 120000
app:
  storage:
    ftp:
      # FTP 连接和数据传输超时时间，单位毫秒
      connect-timeout-ms: 10000
      data-timeout-ms: 30000
  vector-task:
    enabled: true
    # 向量化任务轮询间隔，单位毫秒
    poll-delay-ms: 5000
    # 超时任务恢复扫描间隔，单位毫秒
    recover-delay-ms: 60000
    # 单个向量化任务最大处理时间，超过后进入恢复或失败流程
    timeout-minutes: 30
  agent:
    stream:
      # 单次SSE连接最长保留3分钟
      timeout-ms: 180000
      # 最终Markdown每个增量事件建议字符数
      chunk-size: 200
      # 默认保持v1，前端适配完成后再调整为2
      default-version: 1
      # v2必须发送最终快照，用于前端完整性修复
      snapshot-enabled: true
      # Agent异步执行线程池配置
      executor-core-size: 4
      executor-max-size: 16
      executor-queue-capacity: 200
      # SSE v2总开关，false时全部回退v1
      v2-enabled: true
      # v2灰度比例，生产环境从5开始
      v2-rollout-percentage: 100
      # 强制进入v2的用户，使用英文逗号分隔
      v2-allow-users: ""
      # 强制回退v1的用户
      v2-deny-users: ""
    answer:
      # 标准事实模型开关，紧急回滚时可设为false
      structured-enabled: true
      # Java确定性Markdown开关
      deterministic-markdown-enabled: true
mybatis-plus:
  # MyBatis Plus XML Mapper 扫描路径
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # 数据库下划线字段自动映射 Java 驼峰字段
    map-underscore-to-camel-case: true
management:
  endpoints:
    web:
      exposure:
        # 不要暴露env、configprops等敏感端点
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: mc-ai
agent:
  capability-routing:
    # 最终交给大模型精排的能力数量
    top-k: 5
    # 是否启用关键词 + PGVector 混合召回
    hybrid-enabled: true
    # 两种召回通道的初始候选数量
    keyword-top-k: 10
    vector-top-k: 10
    # 向量召回最低相似度
    min-vector-score: 0.45
    # 混合评分权重
    keyword-weight: 0.40
    vector-weight: 0.60
    dual-hit-bonus: 0.05

    min-recall-score: 0.06
    min-confidence: 0.75
    min-score-margin: 0.12